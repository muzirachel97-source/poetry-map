<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            background-color: #f5f0e8;
            color: #333;
        }

        #header {
            text-align: center;
            padding: 16px;
            background-color: #5a3e2b;
            color: #f5f0e8;
        }

        #header h1 {
            font-size: 1.8rem;
            letter-spacing: 8px;
        }

        #map {
            width: 100%;
            height: calc(100vh - 60px);
        }

        .leaflet-container {
            background-color: #f5f0e8;
        }

        .province-label {
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
        }

        .province-label-scroll {
            display: inline-block;
            position: relative;
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            font-size: 13px;
            color: #5a3e2b;
            padding: 3px 14px;
            background: linear-gradient(180deg,
                rgba(240, 232, 215, 0.75) 0%,
                rgba(248, 242, 230, 0.8) 50%,
                rgba(240, 232, 215, 0.75) 100%);
            border-left: 3px solid rgba(180, 150, 100, 0.5);
            border-right: 3px solid rgba(180, 150, 100, 0.5);
            border-radius: 3px;
            box-shadow: 0 1px 4px rgba(90, 62, 43, 0.1);
        }

        .city-tooltip {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            font-size: 18px;
            color: #5a3e2b;
            background: rgba(245, 240, 232, 0.92);
            border: 1px solid #c4a87c;
            border-radius: 4px;
            padding: 4px 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #5a3e2b;
            z-index: 1000;
            background: rgba(245, 240, 232, 0.95);
            padding: 20px 40px;
            border-radius: 8px;
            border: 1px solid #c4a87c;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>诗词地图</h1>
    </div>
    <div id="map"></div>
    <div id="loading">地图加载中...</div>

    <script>
        var map = L.map('map', {
            zoomControl: true,
            minZoom: 4,
            maxZoom: 8
        }).setView([33, 105], 5);

        map.createPane('cityPane');
        map.getPane('cityPane').style.zIndex = 400;

        map.createPane('provincePane');
        map.getPane('provincePane').style.zIndex = 450;

        map.createPane('labelPane');
        map.getPane('labelPane').style.zIndex = 460;

        var cityStyle = {
            color: '#b8a080',
            weight: 0.5,
            fillColor: '#faf6ee',
            fillOpacity: 1,
            pane: 'cityPane'
        };

        var wholeRegionStyle = {
            color: '#b8a080',
            weight: 0,
            fillColor: '#faf6ee',
            fillOpacity: 1,
            pane: 'cityPane'
        };

        var provinceStyle = {
            color: '#6b5540',
            weight: 1.5,
            fill: false,
            pane: 'provincePane'
        };

        var highlightStyle = {
            fillColor: '#f0e6d3',
            fillOpacity: 1
        };

        var poems = [
            {
                name: "白帝城",
                lat: 31.04,
                lng: 109.55,
                poet: "李白",
                title: "早发白帝城",
                content: "朝辞白帝彩云间，千里江陵一日还。\n两岸猿声啼不住，轻舟已过万重山。"
            },
            {
                name: "岳阳楼",
                lat: 29.37,
                lng: 113.09,
                poet: "杜甫",
                title: "登岳阳楼",
                content: "昔闻洞庭水，今上岳阳楼。\n吴楚东南坼，乾坤日夜浮。\n亲朋无一字，老病有孤舟。\n戎马关山北，凭轩涕泗流。"
            },
            {
                name: "庐山",
                lat: 29.56,
                lng: 115.97,
                poet: "苏轼",
                title: "题西林壁",
                content: "横看成岭侧成峰，远近高低各不同。\n不识庐山真面目，只缘身在此山中。"
            },
            {
                name: "黄鹤楼",
                lat: 30.55,
                lng: 114.30,
                poet: "崔颢",
                title: "黄鹤楼",
                content: "昔人已乘黄鹤去，此地空余黄鹤楼。\n黄鹤一去不复返，白云千载空悠悠。\n晴川历历汉阳树，芳草萋萋鹦鹉洲。\n日暮乡关何处是？烟波江上使人愁。"
            },
            {
                name: "长安",
                lat: 34.26,
                lng: 108.94,
                poet: "王维",
                title: "送元二使安西",
                content: "渭城朝雨浥轻尘，客舍青青柳色新。\n劝君更尽一杯酒，西出阳关无故人。"
            }
        ];

        var noExpand = [
            110000, 120000, 310000, 500000,
            710000, 810000, 820000
        ];

        var labelOverrides = {
            130000: [38.5, 116.0],
            140000: [37.0, 112.3],
            150000: [43.0, 114.0],
            230000: [47.5, 128.0],
            370000: [36.2, 118.5],
            420000: [31.2, 112.2],
            430000: [27.5, 111.5],
            460000: [19.2, 109.7],
            500000: [30.3, 107.3],
            610000: [36.0, 109.0],
            620000: [38.5, 101.5],
            640000: [37.3, 106.2],
            710000: [23.7, 121.0],
            810000: [22.35, 114.15],
            820000: [22.15, 113.55]
        };

        function bindCityEvents(layer, style) {
            if (layer.feature && layer.feature.properties.name) {
                layer.bindTooltip(layer.feature.properties.name, {
                    className: 'city-tooltip',
                    direction: 'center',
                    sticky: false
                });
            }
            layer.on('mouseover', function() {
                layer.setStyle(highlightStyle);
            });
            layer.on('mouseout', function() {
                layer.setStyle(style);
            });
        }

        function renderMap(provinceData, cityResults, wholeFeatures) {
            document.getElementById('loading').style.display = 'none';

            wholeFeatures.forEach(function(feature) {
                L.geoJSON({ type: 'FeatureCollection', features: [feature] }, {
                    style: wholeRegionStyle,
                    onEachFeature: function(f, layer) { bindCityEvents(layer, wholeRegionStyle); }
                }).addTo(map);
            });

            cityResults.forEach(function(data) {
                if (!data) return;
                L.geoJSON(data, {
                    style: cityStyle,
                    onEachFeature: function(f, layer) { bindCityEvents(layer, cityStyle); }
                }).addTo(map);
            });

            L.geoJSON(provinceData, { style: provinceStyle }).addTo(map);

            provinceData.features.forEach(function(f) {
                var code = f.properties.adcode;
                if (typeof code !== 'number') return;
                var center;
                if (labelOverrides[code]) {
                    center = L.latLng(labelOverrides[code][0], labelOverrides[code][1]);
                } else {
                    var pt = f.properties.centroid || f.properties.center;
                    if (!pt) return;
                    center = L.latLng(pt[1], pt[0]);
                }
                L.marker(center, {
                    icon: L.divIcon({
                        className: 'province-label',
                        html: '<span class="province-label-scroll">' + f.properties.name + '</span>',
                        iconSize: null
                    }),
                    interactive: false,
                    pane: 'labelPane'
                }).addTo(map);
            });
        }

        fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(function(r) { return r.json(); })
            .then(function(provinceData) {
                var expandCodes = [];
                var wholeFeatures = [];

                provinceData.features.forEach(function(f) {
                    var code = f.properties.adcode;
                    if (typeof code === 'number' && noExpand.indexOf(code) === -1) {
                        expandCodes.push(code);
                    } else if (typeof code === 'number') {
                        wholeFeatures.push(f);
                    }
                });

                return Promise.all(expandCodes.map(function(code) {
                    return fetch('https://geo.datav.aliyun.com/areas_v3/bound/' + code + '_full.json')
                        .then(function(r) {
                            if (!r.ok) return null;
                            return r.json();
                        })
                        .catch(function() { return null; });
                })).then(function(cityResults) {
                    renderMap(provinceData, cityResults, wholeFeatures);
                });
            })
            .catch(function(err) {
                document.getElementById('loading').textContent = '地图加载失败，请刷新重试';
            });
    </script>
</body>
</html>
