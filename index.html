<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词地图</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --paper-bg: #e5d8be;
            --paper-light: #f3ead8;
            --paper-mid: #efe4cf;
            --ink-main: #3f3a32;
            --ink-soft: #7c745f;
            --ink-faint: #a9a287;
            --seal-red: #b14a3a;
            --green-1: #bacfb5;
            --green-2: #a1bca0;
            --green-3: #88ab8d;
            --green-4: #6d9b79;
            --green-5: #548962;
            --green-6: #3f7950;
            --map-empty: #e3d7bf;
            --paper-grain: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            background: var(--paper-bg) url('全2.png') center center / cover no-repeat fixed;
            color: var(--ink-main);
        }

        #header {
            position: fixed;
            top: 12vh;
            left: 6vw;
            z-index: 500;
            pointer-events: auto;
            transform: scale(1.44);
            transform-origin: top left;
        }

        #header h1 {
            font-family: "Ma Shan Zheng", "Zhi Mang Xing", "方正字迹-曾正国行书", "FZZhiJi-ZengZhengGuoXingShuS", "方正清刻本悦宋", "FZQingKeBenYueSongS-R-GB", "STKaiti", "KaiTi", "STXingkai", "华文行楷", cursive, serif;
            font-size: 2.8rem;
            letter-spacing: 0.1em;
            font-weight: 400;
            color: #2d4a3b;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.06);
            position: relative;
            display: inline-block;
        }

        .header-seal {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: -42px;
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            text-align: center;
            font-family: "FangSong", "仿宋", "STFangsong", "KaiTi", "STKaiti", "楷体", serif;
            font-size: 19px;
            font-weight: 400;
            color: rgba(200, 182, 148, 0.8);
            background: rgba(177, 74, 58, 0.78);
            border-radius: 6px;
            box-shadow: 0 0 0 1.5px rgba(160, 60, 45, 0.3);
        }
        .header-seal::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 6px;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(220,200,170,0.12) 0%, transparent 45%),
                radial-gradient(ellipse at 75% 65%, rgba(220,200,170,0.08) 0%, transparent 40%),
                radial-gradient(circle at 10% 70%, rgba(200,180,150,0.1) 0%, transparent 25%);
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .header-subtitle {
            font-family: "FangSong", "仿宋", "SimSun", "宋体", serif;
            font-size: 0.95rem;
            letter-spacing: 0.25em;
            color: #6b6450;
            margin-top: 10px;
            text-align: left;
        }

        .mode-toggle {
            display: flex;
            gap: 0;
            margin-top: 16px;
            justify-content: flex-start;
            margin-left: -12px;
        }

        .mode-btn {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            padding: 2px 12px;
            border: none;
            background: none;
            color: #6b7b67;
            cursor: pointer;
            transition: color 0.3s;
            position: relative;
        }

        .mode-btn + .mode-btn::before {
            content: '·';
            position: absolute;
            left: -2px;
            color: rgba(107, 123, 103, 0.4);
        }

        .mode-btn.active {
            color: #2f4f3f;
            border-bottom: 1.5px solid rgba(47, 79, 63, 0.45);
            padding-bottom: 2px;
        }

        .mode-btn:hover:not(.active) {
            color: #4a5f4a;
        }

        #map {
            width: 100%;
            height: 100vh;
            filter: sepia(0.12) saturate(0.92) contrast(0.96);
        }

        #map::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 999;
            background: var(--paper-grain);
        }

        .leaflet-container {
            background-color: transparent;
        }

        .leaflet-interactive:focus {
            outline: none;
        }

        .province-label {
            pointer-events: none;
            white-space: nowrap;
        }

        .province-label-scroll {
            display: inline-block;
            transform: translate(-50%, -50%);
            font-family: "STXingkai", "华文行楷", "STKaiti", "KaiTi", "楷体", serif;
            font-size: 20px;
            color: rgba(55, 50, 42, 0.75);
            letter-spacing: 0.12em;
        }

        .city-tooltip {
            font-family: "KaiTi", "STKaiti", "楷体", "FangSong", "仿宋", serif;
            font-size: 16px;
            color: var(--ink-main);
            line-height: 1.6;
            background: var(--paper-light);
            border: none;
            border-radius: 1px;
            padding: 6px 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1rem;
            color: var(--ink-soft);
            z-index: 1000;
            background: var(--paper-light);
            padding: 18px 36px;
            border-radius: 3px;
            border: none;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        #poem-panel {
            position: fixed;
            right: -580px;
            top: 0;
            width: 540px;
            height: 100vh;
            max-height: 100vh;
            background:
                var(--paper-grain),
                repeating-linear-gradient(
                    0deg,
                    rgba(160, 140, 100, 0.035) 0px,
                    transparent 1px,
                    transparent 3px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(155, 135, 95, 0.025) 0px,
                    transparent 1px,
                    transparent 4px
                ),
                radial-gradient(ellipse at 30% 40%, rgba(200, 180, 140, 0.12), transparent 70%),
                radial-gradient(ellipse at 70% 75%, rgba(195, 172, 130, 0.08), transparent 55%),
                linear-gradient(180deg, #ede0c8, #e8d9c0, #e3d4ba);
            border-left: 1px solid rgba(120, 100, 70, 0.06);
            box-shadow: -3px 0 18px rgba(0, 0, 0, 0.03);
            z-index: 1000;
            overflow-y: auto;
            transition: right 0.4s ease-out;
            font-family: "KaiTi", "STKaiti", "楷体", serif;
        }

        #poem-panel::-webkit-scrollbar { width: 4px; }
        #poem-panel::-webkit-scrollbar-track { background: transparent; }
        #poem-panel::-webkit-scrollbar-thumb { background: rgba(120, 100, 70, 0.2); border-radius: 2px; }

        #poem-panel.open {
            right: 0;
        }

        .panel-header {
            padding: 28px 20px 16px;
            border-bottom: 1px solid rgba(120, 100, 70, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .panel-header h2 {
            font-family: "SimSun", "宋体", "KaiTi", "STKaiti", serif;
            font-size: 2rem;
            color: #2f2b24;
            letter-spacing: 6px;
        }

        .panel-close {
            border: none;
            background: none;
            font-size: 1.3rem;
            color: var(--ink-faint);
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .panel-close:hover {
            color: var(--ink-main);
        }

        .panel-back {
            border: none;
            background: none;
            font-size: 1.05rem;
            color: var(--ink-soft);
            cursor: pointer;
            padding: 2px 4px;
            font-family: "KaiTi", "STKaiti", "楷体", serif;
        }

        .panel-back:hover {
            color: var(--ink-main);
        }

        .poem-count {
            font-size: 1rem;
            color: var(--ink-faint);
            padding: 0 20px 12px;
            font-family: "FangSong", "仿宋", serif;
        }

        .poem-list {
            padding: 4px 0 20px;
        }

        .poem-card {
            background: var(--paper-grain), rgba(244, 235, 216, 0.72);
            margin: 0 16px 20px;
            padding: 26px 28px;
            border: none;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.025);
            cursor: pointer;
            position: relative;
            transition: background 0.25s ease;
        }

        .poem-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) 12px 8px / calc(100% - 24px) 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) 12px calc(100% - 8px) / calc(100% - 24px) 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) 8px 12px / 1px calc(100% - 24px) no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) calc(100% - 8px) 12px / 1px calc(100% - 24px) no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) 12px 8px / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) 8px 12px / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) calc(100% - 12px) 8px / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) calc(100% - 8px) 12px / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) 12px calc(100% - 8px) / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) 8px calc(100% - 12px) / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) calc(100% - 12px) calc(100% - 8px) / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.13), rgba(120,100,70,0.13)) calc(100% - 8px) calc(100% - 12px) / 5px 1px no-repeat;
        }

        .poem-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) 5px 1px / calc(100% - 10px) 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) 5px calc(100% - 1px) / calc(100% - 10px) 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) 1px 5px / 1px calc(100% - 10px) no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) calc(100% - 1px) 5px / 1px calc(100% - 10px) no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) 5px 1px / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) 1px 5px / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) calc(100% - 5px) 1px / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) calc(100% - 1px) 5px / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) 5px calc(100% - 1px) / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) 1px calc(100% - 5px) / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) calc(100% - 5px) calc(100% - 1px) / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.18), rgba(120,100,70,0.18)) calc(100% - 1px) calc(100% - 5px) / 5px 1px no-repeat;
        }

        .poem-card:hover {
            background: var(--paper-grain), rgba(244, 235, 216, 0.88);
        }

        .poem-card .card-title {
            font-family: "KaiTi", "STKaiti", "FangSong", "仿宋", serif;
            font-size: 1.4rem;
            font-weight: 400;
            color: #3f3a32;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
            padding-right: 26px;
        }

        .poem-card .card-author {
            font-size: 0.96rem;
            color: #8d866f;
            margin-bottom: 14px;
        }

        .poem-card .card-excerpt {
            font-family: "FangSong", "仿宋", "KaiTi", "STKaiti", serif;
            font-size: 1.2rem;
            color: #5b5548;
            line-height: 2.1;
            white-space: pre-line;
        }

        .poem-card .card-seal {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 1;
            opacity: 0.85;
        }

        .poem-detail {
            padding: 28px 24px 40px;
            position: relative;
        }

        .poem-detail .detail-title {
            font-family: "FangSong", "仿宋", "SimSun", "宋体", serif;
            font-size: 2.1rem;
            color: #2f2c24;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .poem-detail .detail-poet {
            font-size: 1.35rem;
            color: var(--ink-soft);
            text-align: center;
            margin-bottom: 28px;
        }

        .poem-detail .detail-preface {
            font-size: 1.2rem;
            color: var(--ink-soft);
            line-height: 2.0;
            text-align: center;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px dashed rgba(120, 100, 70, 0.15);
        }

        .poem-detail .detail-content {
            font-size: 1.65rem;
            color: var(--ink-main);
            line-height: 2.4;
            text-align: center;
            white-space: pre-line;
        }

        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--paper-grain), linear-gradient(180deg, #e0d0a8, #d8c89e);
            border: none;
            border-radius: 1px;
            padding: 14px 18px;
            z-index: 1000;
            font-family: "FangSong", "仿宋", "KaiTi", "STKaiti", "楷体", serif;
            font-size: 0.75rem;
            color: #4a4a4a;
            box-shadow: 0 1px 6px rgba(60, 50, 30, 0.06);
            transform: scale(1.44);
            transform-origin: bottom left;
        }

        #legend::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) 9px 5px / calc(100% - 18px) 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) 9px calc(100% - 5px) / calc(100% - 18px) 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) 5px 9px / 1px calc(100% - 18px) no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) calc(100% - 5px) 9px / 1px calc(100% - 18px) no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) 9px 5px / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) 5px 9px / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) calc(100% - 9px) 5px / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) calc(100% - 5px) 9px / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) 9px calc(100% - 5px) / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) 5px calc(100% - 9px) / 5px 1px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) calc(100% - 9px) calc(100% - 5px) / 1px 5px no-repeat,
                linear-gradient(rgba(120,100,70,0.16), rgba(120,100,70,0.16)) calc(100% - 5px) calc(100% - 9px) / 5px 1px no-repeat;
        }

        #legend h4 {
            margin-bottom: 5px;
            font-size: 0.78rem;
            letter-spacing: 2px;
            color: #5a5347;
            border-bottom: 1px solid rgba(120, 100, 70, 0.10);
            padding-bottom: 3px;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 2px 0;
            font-family: "Palatino Linotype", "Book Antiqua", "Georgia", "FangSong", "仿宋", serif;
            font-style: italic;
            font-size: 0.78rem;
            color: #4a4a4a;
        }

        .legend-color {
            width: 18px;
            height: 10px;
            border: 1px solid rgba(120, 100, 70, 0.08);
            border-radius: 2px;
            flex-shrink: 0;
        }
        #decor-overlay {
            display: none;
        }


        .dynasty-seal {
            display: inline-block;
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin-right: 4px;
            position: relative;
            top: -1px;
        }

    </style>
</head>
<body>
    <div id="header">
        <h1>诗词地图
            <span class="header-seal" id="header-seal">诗</span>
        </h1>
        <div class="header-subtitle">唐宋诗词地理分布</div>
        <div class="mode-toggle">
            <button class="mode-btn" onclick="switchMode('tangshi')">唐诗</button>
            <button class="mode-btn" onclick="switchMode('songci')">宋词</button>
            <button class="mode-btn active" onclick="switchMode('all')">全部</button>
        </div>
    </div>
    <div id="map"></div>
    <svg style="position:absolute;width:0;height:0;">
        <defs>
            <mask id="seal-tang-mask">
                <rect width="28" height="28" fill="white"/>
                <text x="14" y="21" text-anchor="middle" font-size="18" font-family="KaiTi, STKaiti, 楷体, serif" font-weight="400" fill="black">唐</text>
            </mask>
            <mask id="seal-song-mask">
                <rect width="28" height="28" fill="white"/>
                <text x="14" y="21" text-anchor="middle" font-size="18" font-family="KaiTi, STKaiti, 楷体, serif" font-weight="400" fill="black">宋</text>
            </mask>
        </defs>
    </svg>
    <div id="decor-overlay"></div>
    <div id="loading">地图加载中...</div>

    <div id="legend">
        <h4 id="legend-title">诗词数量</h4>
        <div class="legend-row"><span class="legend-color" style="background:rgba(227,215,191,0.82)"></span> 0</div>
        <div class="legend-row"><span class="legend-color" style="background:rgba(186,207,181,0.82)"></span> 1-2</div>
        <div class="legend-row"><span class="legend-color" style="background:rgba(161,188,160,0.82)"></span> 3-5</div>
        <div class="legend-row"><span class="legend-color" style="background:rgba(136,171,141,0.82)"></span> 6-10</div>
        <div class="legend-row"><span class="legend-color" style="background:rgba(109,155,121,0.82)"></span> 11-20</div>
        <div class="legend-row"><span class="legend-color" style="background:rgba(84,137,98,0.82)"></span> 21-50</div>
        <div class="legend-row"><span class="legend-color" style="background:rgba(63,121,80,0.82)"></span> 50+</div>
    </div>

    <div id="poem-panel">
        <div class="panel-header">
            <span id="panel-back-btn"></span>
            <h2 id="panel-title"></h2>
            <button class="panel-close" onclick="closePanel()">&#x2715;</button>
        </div>
        <div id="panel-body"></div>
    </div>

    <script src="poems_data.js"></script>
    <script>
        (function() {
            var c = document.createElement('canvas');
            c.width = 150; c.height = 150;
            var ctx = c.getContext('2d');
            for (var y = 0; y < 150; y += 3) {
                for (var x = 0; x < 150; x += 3) {
                    var v = Math.random() * 55 + 110;
                    var a = (Math.random() * 0.14 + 0.02) * 0.8;
                    ctx.fillStyle = 'rgba(' + Math.floor(v + 12) + ',' + Math.floor(v + 3) + ',' + Math.floor(v - 18) + ',' + a + ')';
                    ctx.fillRect(x, y, 3, 3);
                }
            }
            for (var i = 0; i < 28; i++) {
                var fx = Math.random() * 145;
                var fy = Math.random() * 145;
                var fw = Math.random() * 4 + 2;
                var fh = Math.random() * 2 + 1;
                var fv = Math.random() * 40 + 100;
                ctx.fillStyle = 'rgba(' + Math.floor(fv + 10) + ',' + Math.floor(fv) + ',' + Math.floor(fv - 20) + ',' + (Math.random() * 0.1 + 0.04) * 0.8 + ')';
                ctx.fillRect(fx, fy, fw, fh);
            }
            document.documentElement.style.setProperty('--paper-grain', 'url(' + c.toDataURL() + ')');
        })();

        (function() {
            var seal = document.getElementById('header-seal');
            if (!seal) return;
            var sc = document.createElement('canvas');
            sc.width = 36; sc.height = 36;
            var sctx = sc.getContext('2d');
            for (var y = 0; y < 36; y += 2) {
                for (var x = 0; x < 36; x += 2) {
                    if (Math.random() < 0.18) {
                        var a = Math.random() * 0.15 + 0.03;
                        sctx.fillStyle = 'rgba(220,200,170,' + a + ')';
                        sctx.fillRect(x, y, 2, 2);
                    }
                }
            }
            for (var i = 0; i < 2; i++) {
                var sx = Math.random() * 30;
                var sy = Math.random() * 30;
                var sw = Math.random() * 6 + 2;
                var sh = Math.random() * 2 + 1;
                sctx.fillStyle = 'rgba(220,200,170,' + (Math.random() * 0.1 + 0.05) + ')';
                sctx.fillRect(sx, sy, sw, sh);
            }
            seal.style.backgroundImage = 'url(' + sc.toDataURL() + ')';
            seal.style.backgroundBlendMode = 'screen';
        })();

        var map = L.map('map', {
            zoomControl: false,
            minZoom: 4,
            maxZoom: 8,
            zoomSnap: 0.25,
            zoomDelta: 0.25
        }).setView([37.0, 105], 5.25);

        map.createPane('cityPane');
        map.getPane('cityPane').style.zIndex = 400;

        map.createPane('provincePane');
        map.getPane('provincePane').style.zIndex = 450;

        map.createPane('labelPane');
        map.getPane('labelPane').style.zIndex = 460;

        map.createPane('borderPane');
        map.getPane('borderPane').style.zIndex = 470;

        function poemColor(count) {
            if (!count) return '#e3d7bf';
            if (count <= 2) return '#bacfb5';
            if (count <= 5) return '#a1bca0';
            if (count <= 10) return '#88ab8d';
            if (count <= 20) return '#6d9b79';
            if (count <= 50) return '#548962';
            return '#3f7950';
        }

        var cityStyle = {
            color: 'rgba(88, 78, 56, 0.22)',
            weight: 0.5,
            fillColor: 'transparent',
            fillOpacity: 0,
            pane: 'cityPane'
        };

        var wholeRegionStyle = {
            color: 'rgba(88, 78, 56, 0.12)',
            weight: 0,
            fillColor: 'transparent',
            fillOpacity: 0,
            pane: 'cityPane'
        };

        var provinceStyle = {
            color: 'rgba(88, 78, 56, 0.36)',
            weight: 1.0,
            fill: false,
            pane: 'provincePane'
        };

        var highlightStyle = {
            fillColor: 'rgba(100, 133, 110, 0.25)',
            fillOpacity: 1
        };

        var activeStyle = {
            fillColor: 'rgba(100, 133, 110, 0.38)',
            fillOpacity: 1
        };

        var poemsByCity = allByCity;
        var currentMode = 'all';
        var cityLayers = [];

        var activeLayer = null;
        var activeLayerStyle = null;
        var hoveredLayer = null;

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'tangshi') {
                poemsByCity = tangshiByCity;
            } else if (mode === 'songci') {
                poemsByCity = songciByCity;
            } else {
                poemsByCity = allByCity;
            }

            var titles = { tangshi: '唐诗数量', songci: '宋词数量', all: '诗词数量' };
            document.getElementById('legend-title').textContent = titles[mode];

            var btns = document.querySelectorAll('.mode-btn');
            btns.forEach(function(btn) { btn.classList.remove('active'); });
            var modeIdx = { tangshi: 0, songci: 1, all: 2 };
            btns[modeIdx[mode]].classList.add('active');

            activeLayer = null;

            cityLayers.forEach(function(item) {
                var name = item.name;
                var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                var s = {
                    color: 'rgba(88, 78, 56, 0.22)',
                    weight: 0.5,
                    fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                    fillOpacity: count > 0 ? 0.82 : 0.45,
                    pane: 'cityPane'
                };
                item.layer.setStyle(s);
                item.style = s;
            });

            closePanel();
        }

        function closePanel() {
            document.getElementById('poem-panel').classList.remove('open');
            if (activeLayer) {
                activeLayer.setStyle(activeLayerStyle);
                activeLayer = null;
            }
        }

        function getExcerpt(content, lines) {
            var arr = content.split('\n');
            return arr.slice(0, lines || 2).join('\n');
        }

        function showPoemList(cityName, poems) {
            var panel = document.getElementById('poem-panel');
            var title = document.getElementById('panel-title');
            var body = document.getElementById('panel-body');
            var backBtn = document.getElementById('panel-back-btn');

            title.textContent = cityName;
            backBtn.innerHTML = '';

            var html = '<div class="poem-count">共收录 ' + poems.length + ' 首</div><div class="poem-list">';
            poems.forEach(function(poem, i) {
                var sealMaskId = poem.dynasty === '唐' ? 'seal-tang-mask' : 'seal-song-mask';
                var sealSvg = '<svg class="card-seal" viewBox="0 0 28 28" width="28" height="28">'
                    + '<rect width="28" height="28" rx="4" fill="rgba(177, 74, 58, 0.6)" mask="url(#' + sealMaskId + ')"/>'
                    + '</svg>';
                var excerpt = getExcerpt(poem.content, 2);
                var safeCityName = cityName.replace(/'/g, "\\'");
                html += '<div class="poem-card" onclick="showPoemDetail(\'' + safeCityName + '\',' + i + ')">'
                    + sealSvg
                    + '<div class="card-title">' + poem.title + '</div>'
                    + '<div class="card-author">' + (poem.dynasty ? poem.dynasty + '·' : '') + poem.poet + '</div>'
                    + '<div class="card-excerpt">' + excerpt + '</div>'
                    + '</div>';
            });
            html += '</div>';
            body.innerHTML = html;
            panel.classList.add('open');
        }

        function showPoemDetail(cityName, index) {
            var poems = poemsByCity[cityName];
            var poem = poems[index];
            var title = document.getElementById('panel-title');
            var body = document.getElementById('panel-body');
            var backBtn = document.getElementById('panel-back-btn');

            var safeCityName = cityName.replace(/'/g, "\\'");
            title.textContent = '';
            backBtn.innerHTML = '<button class="panel-back" onclick="showPoemList(\'' + safeCityName + '\', poemsByCity[\'' + safeCityName + '\'])">← 返回列表</button>';

            var dynastyText = poem.dynasty ? poem.dynasty + '·' : '';
            var prefaceHtml = poem.preface
                ? '<div class="detail-preface">' + poem.preface + '</div>'
                : '';
            body.innerHTML = '<div class="poem-detail">'
                + '<div class="detail-title">' + poem.title + '</div>'
                + '<div class="detail-poet">' + dynastyText + poem.poet + '</div>'
                + prefaceHtml
                + '<div class="detail-content">' + poem.content + '</div>'
                + '</div>';
        }

        var noExpand = [
            110000, 120000, 310000, 500000,
            710000, 810000, 820000
        ];

        var labelOverrides = {
            110000: [39.95, 116.4],
            120000: [39.2, 117.2],
            130000: [38.5, 115.5],
            140000: [37.5, 112.3],
            150000: [43.0, 113.0],
            210000: [41.5, 123.0],
            220000: [43.5, 126.0],
            230000: [47.5, 128.0],
            310000: [31.2, 121.5],
            320000: [33.0, 119.5],
            330000: [29.0, 120.0],
            340000: [31.8, 117.2],
            350000: [26.0, 117.8],
            360000: [27.6, 115.8],
            370000: [36.2, 118.5],
            410000: [34.0, 113.5],
            420000: [31.0, 112.2],
            430000: [27.5, 111.5],
            440000: [23.5, 113.3],
            450000: [23.7, 108.5],
            460000: [19.15, 109.75],
            500000: [30.0, 107.3],
            510000: [30.5, 103.5],
            520000: [26.8, 106.8],
            530000: [25.0, 101.5],
            540000: [31.5, 87.0],
            610000: [35.5, 109.0],
            620000: [38.0, 102.5],
            630000: [35.5, 96.5],
            640000: [37.3, 106.2],
            650000: [41.5, 85.5],
            710000: [23.6, 120.85],
            810000: [22.35, 114.18],
            820000: [22.15, 113.55]
        };

        function findCityItem(layer) {
            for (var i = 0; i < cityLayers.length; i++) {
                if (cityLayers[i].layer === layer) return cityLayers[i];
            }
            return null;
        }

        function bindCityEvents(layer, style) {
            var name = layer.feature && layer.feature.properties.name;
            if (name) {
                layer.bindTooltip(name, {
                    className: 'city-tooltip',
                    direction: 'center',
                    sticky: false
                });
            }
            layer.on('mouseover', function() {
                if (hoveredLayer && hoveredLayer !== layer) {
                    hoveredLayer.closeTooltip();
                    if (activeLayer !== hoveredLayer) {
                        var prevItem = findCityItem(hoveredLayer);
                        hoveredLayer.setStyle(prevItem ? prevItem.style : style);
                    }
                }
                hoveredLayer = layer;
                if (activeLayer !== layer) {
                    layer.setStyle(highlightStyle);
                }
            });
            layer.on('mouseout', function() {
                if (hoveredLayer === layer) {
                    hoveredLayer = null;
                }
                if (activeLayer !== layer) {
                    var item = findCityItem(layer);
                    layer.setStyle(item ? item.style : style);
                }
            });
            layer.on('click', function() {
                if (name && poemsByCity[name]) {
                    if (activeLayer && activeLayer !== layer) {
                        activeLayer.closeTooltip();
                        var prevItem = findCityItem(activeLayer);
                        activeLayer.setStyle(prevItem ? prevItem.style : activeLayerStyle);
                    }
                    activeLayer = layer;
                    layer.closeTooltip();
                    var curItem = findCityItem(layer);
                    activeLayerStyle = curItem ? curItem.style : style;
                    layer.setStyle(activeStyle);
                    showPoemList(name, poemsByCity[name]);
                }
            });
        }

        function renderMap(provinceData, cityResults, wholeFeatures) {
            document.getElementById('loading').style.display = 'none';

            wholeFeatures.forEach(function(feature) {
                L.geoJSON({ type: 'FeatureCollection', features: [feature] }, {
                    style: function(f) {
                        var name = f.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        return {
                            color: 'rgba(88, 78, 56, 0.22)',
                            weight: 0.5,
                            fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                            fillOpacity: count > 0 ? 0.82 : 0.45,
                            pane: 'cityPane'
                        };
                    },
                    onEachFeature: function(f, layer) {
                        var name = f.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        var s = {
                            color: 'rgba(88, 78, 56, 0.22)',
                            weight: 0.5,
                            fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                            fillOpacity: count > 0 ? 0.82 : 0.45,
                            pane: 'cityPane'
                        };
                        var item = { name: name, layer: layer, style: s };
                        cityLayers.push(item);
                        bindCityEvents(layer, s);
                    }
                }).addTo(map);
            });

            cityResults.forEach(function(data) {
                if (!data) return;
                L.geoJSON(data, {
                    style: function(feature) {
                        var name = feature.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        return {
                            color: 'rgba(88, 78, 56, 0.22)',
                            weight: 0.5,
                            fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                            fillOpacity: count > 0 ? 0.82 : 0.45,
                            pane: 'cityPane'
                        };
                    },
                    onEachFeature: function(f, layer) {
                        var name = f.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        var s = {
                            color: 'rgba(88, 78, 56, 0.22)',
                            weight: 0.5,
                            fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                            fillOpacity: count > 0 ? 0.82 : 0.45,
                            pane: 'cityPane'
                        };
                        var item = { name: name, layer: layer, style: s };
                        cityLayers.push(item);
                        bindCityEvents(layer, s);
                    }
                }).addTo(map);
            });

            L.geoJSON(provinceData, { style: provinceStyle }).addTo(map);

            fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000.json')
                .then(function(r) { return r.json(); })
                .then(function(borderData) {
                    L.geoJSON(borderData, {
                        style: {
                            color: 'rgba(80, 70, 50, 0.40)',
                            weight: 1.6,
                            fill: false,
                            pane: 'borderPane'
                        }
                    }).addTo(map);
                }).catch(function() {});

            provinceData.features.forEach(function(f) {
                var code = f.properties.adcode;
                if (typeof code !== 'number') return;
                var center;
                if (labelOverrides[code]) {
                    center = L.latLng(labelOverrides[code][0], labelOverrides[code][1]);
                } else {
                    var pt = f.properties.centroid || f.properties.center;
                    if (!pt) return;
                    center = L.latLng(pt[1], pt[0]);
                }
                L.marker(center, {
                    icon: L.divIcon({
                        className: 'province-label',
                        html: '<span class="province-label-scroll">' + f.properties.name.replace(/(壮族|回族|维吾尔)?自治区|特别行政区|省|市/g, '') + '</span>',
                        iconSize: null
                    }),
                    interactive: false,
                    pane: 'labelPane'
                }).addTo(map);
            });

        }

        fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(function(r) { return r.json(); })
            .then(function(provinceData) {
                var expandCodes = [];
                var wholeFeatures = [];

                provinceData.features.forEach(function(f) {
                    var code = f.properties.adcode;
                    if (typeof code === 'number' && noExpand.indexOf(code) === -1) {
                        expandCodes.push(code);
                    } else if (typeof code === 'number') {
                        wholeFeatures.push(f);
                    }
                });

                return Promise.all(expandCodes.map(function(code) {
                    return fetch('https://geo.datav.aliyun.com/areas_v3/bound/' + code + '_full.json')
                        .then(function(r) {
                            if (!r.ok) return null;
                            return r.json();
                        })
                        .catch(function() { return null; });
                })).then(function(cityResults) {
                    renderMap(provinceData, cityResults, wholeFeatures);
                });
            })
            .catch(function(err) {
                document.getElementById('loading').textContent = '地图加载失败，请刷新重试';
            });
    </script>
</body>
</html>
