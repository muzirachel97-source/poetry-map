<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            background-color: #f5f0e8;
            color: #333;
        }

        #header {
            text-align: center;
            padding: 16px;
            background-color: #5a3e2b;
            color: #f5f0e8;
        }

        #header h1 {
            font-size: 1.8rem;
            letter-spacing: 8px;
        }

        #map {
            width: 100%;
            height: calc(100vh - 60px);
        }

        .leaflet-container {
            background-color: #f5f0e8;
        }

        .province-label {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            font-size: 13px;
            color: #6b5744;
            white-space: nowrap;
            text-align: center;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(250, 246, 238, 0.9);
        }

        .city-tooltip {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            font-size: 18px;
            color: #5a3e2b;
            background: rgba(245, 240, 232, 0.92);
            border: 1px solid #c4a87c;
            border-radius: 4px;
            padding: 4px 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        .poem-marker {
            background: none;
            border: none;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #5a3e2b;
            z-index: 1000;
            background: rgba(245, 240, 232, 0.95);
            padding: 20px 40px;
            border-radius: 8px;
            border: 1px solid #c4a87c;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>诗词地图</h1>
    </div>
    <div id="map"></div>
    <div id="loading">地图加载中...</div>

    <script>
        var map = L.map('map', {
            zoomControl: true,
            minZoom: 4,
            maxZoom: 8
        }).setView([33, 105], 5);

        var cityStyle = {
            color: '#b8a080',
            weight: 0.5,
            fillColor: '#faf6ee',
            fillOpacity: 1
        };

        var wholeRegionStyle = {
            color: '#b8a080',
            weight: 0,
            fillColor: '#faf6ee',
            fillOpacity: 1
        };

        var provinceStyle = {
            color: '#7a6650',
            weight: 2.5,
            fill: false
        };

        var highlightStyle = {
            fillColor: '#f0e6d3',
            fillOpacity: 1
        };

        var brushSvg = '<svg width="18" height="38" viewBox="0 0 18 38" xmlns="http://www.w3.org/2000/svg">'
            + '<rect x="7" y="0" width="4" height="16" rx="1.5" fill="#8b6914" opacity="0.9"/>'
            + '<rect x="6" y="14" width="6" height="4" rx="1" fill="#a08050"/>'
            + '<path d="M9 17 C9 17 2 26 2 30 C2 34 5 37 9 38 C13 37 16 34 16 30 C16 26 9 17 9 17Z" fill="#2a1810" opacity="0.85"/>'
            + '</svg>';

        var brushIcon = L.divIcon({
            className: 'poem-marker',
            html: brushSvg,
            iconSize: [18, 38],
            iconAnchor: [9, 38]
        });

        var poems = [
            {
                name: "白帝城",
                lat: 31.04,
                lng: 109.55,
                poet: "李白",
                title: "早发白帝城",
                content: "朝辞白帝彩云间，千里江陵一日还。\n两岸猿声啼不住，轻舟已过万重山。"
            },
            {
                name: "岳阳楼",
                lat: 29.37,
                lng: 113.09,
                poet: "杜甫",
                title: "登岳阳楼",
                content: "昔闻洞庭水，今上岳阳楼。\n吴楚东南坼，乾坤日夜浮。\n亲朋无一字，老病有孤舟。\n戎马关山北，凭轩涕泗流。"
            },
            {
                name: "庐山",
                lat: 29.56,
                lng: 115.97,
                poet: "苏轼",
                title: "题西林壁",
                content: "横看成岭侧成峰，远近高低各不同。\n不识庐山真面目，只缘身在此山中。"
            },
            {
                name: "黄鹤楼",
                lat: 30.55,
                lng: 114.30,
                poet: "崔颢",
                title: "黄鹤楼",
                content: "昔人已乘黄鹤去，此地空余黄鹤楼。\n黄鹤一去不复返，白云千载空悠悠。\n晴川历历汉阳树，芳草萋萋鹦鹉洲。\n日暮乡关何处是？烟波江上使人愁。"
            },
            {
                name: "长安",
                lat: 34.26,
                lng: 108.94,
                poet: "王维",
                title: "送元二使安西",
                content: "渭城朝雨浥轻尘，客舍青青柳色新。\n劝君更尽一杯酒，西出阳关无故人。"
            }
        ];

        var noExpand = [
            110000, 120000, 310000, 500000,
            710000, 810000, 820000
        ];

        fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(function(r) { return r.json(); })
            .then(function(provinceData) {
                var expandCodes = [];
                var wholeFeatures = [];

                provinceData.features.forEach(function(f) {
                    var code = f.properties.adcode;
                    if (typeof code === 'number' && noExpand.indexOf(code) === -1) {
                        expandCodes.push(code);
                    } else if (typeof code === 'number') {
                        wholeFeatures.push(f);
                    }
                });

                return Promise.all(expandCodes.map(function(code) {
                    return fetch('https://geo.datav.aliyun.com/areas_v3/bound/' + code + '_full.json')
                        .then(function(r) { return r.json(); })
                        .catch(function() { return null; });
                })).then(function(cityResults) {
                    return {
                        provinceData: provinceData,
                        cityResults: cityResults,
                        wholeFeatures: wholeFeatures
                    };
                });
            })
            .then(function(result) {
                document.getElementById('loading').style.display = 'none';

                result.wholeFeatures.forEach(function(feature) {
                    var geojson = { type: 'FeatureCollection', features: [feature] };
                    L.geoJSON(geojson, {
                        style: wholeRegionStyle,
                        onEachFeature: function(feature, layer) {
                            if (feature.properties.name) {
                                layer.bindTooltip(feature.properties.name, {
                                    className: 'city-tooltip',
                                    direction: 'center',
                                    sticky: false
                                });
                            }
                            layer.on('mouseover', function() {
                                layer.setStyle(highlightStyle);
                                layer.bringToFront();
                            });
                            layer.on('mouseout', function() {
                                layer.setStyle(wholeRegionStyle);
                            });
                        }
                    }).addTo(map);
                });

                result.cityResults.forEach(function(data) {
                    if (!data) return;
                    L.geoJSON(data, {
                        style: cityStyle,
                        onEachFeature: function(feature, layer) {
                            if (feature.properties.name) {
                                layer.bindTooltip(feature.properties.name, {
                                    className: 'city-tooltip',
                                    direction: 'center',
                                    sticky: false
                                });
                            }
                            layer.on('mouseover', function() {
                                layer.setStyle(highlightStyle);
                                layer.bringToFront();
                            });
                            layer.on('mouseout', function() {
                                layer.setStyle(cityStyle);
                            });
                        }
                    }).addTo(map);
                });

                L.geoJSON(result.provinceData, { style: provinceStyle }).addTo(map);

                result.provinceData.features.forEach(function(f) {
                    if (typeof f.properties.adcode !== 'number') return;
                    var layer = L.geoJSON(f);
                    var center = layer.getBounds().getCenter();
                    L.marker(center, {
                        icon: L.divIcon({
                            className: 'province-label',
                            html: f.properties.name,
                            iconSize: null
                        }),
                        interactive: false
                    }).addTo(map);
                });

                poems.forEach(function(poem) {
                    L.marker([poem.lat, poem.lng], { icon: brushIcon }).addTo(map);
                });
            });
    </script>
</body>
</html>
