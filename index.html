<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            background-color: #e5d8be;
            background-image: url('4.png');
            color: #3a2a1a;
        }

        #header {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 500;
            pointer-events: auto;
        }

        #header h1 {
            font-size: 2rem;
            letter-spacing: 8px;
            font-weight: 700;
            color: #3a2a1a;
            text-shadow: 1px 1px 2px rgba(229, 216, 190, 0.8);
        }

        .header-subtitle {
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: rgba(58, 42, 26, 0.55);
            margin-top: 4px;
        }

        .header-seal {
            position: absolute;
            top: 2px;
            right: -44px;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .leaflet-container {
            background-color: #ddd4b8;
        }

        .leaflet-interactive:focus {
            outline: none;
        }

        .province-label {
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
        }

        .province-label-scroll {
            display: inline-block;
            position: relative;
            font-family: "STXingkai", "华文行楷", "STKaiti", "KaiTi", "楷体", serif;
            font-size: 15px;
            color: #3a2a1a;
            padding: 2px 10px;
            background: rgba(229, 216, 190, 0.6);
            border-radius: 2px;
        }

        .city-tooltip {
            font-family: "STXingkai", "华文行楷", "STKaiti", "KaiTi", "楷体", serif;
            font-size: 16px;
            color: #3a2a1a;
            background: rgba(229, 216, 190, 0.94);
            border: 1px solid rgba(80, 60, 40, 0.15);
            border-left: 3px solid rgba(180, 58, 48, 0.5);
            border-radius: 2px;
            padding: 4px 10px;
            box-shadow: 2px 2px 8px rgba(58, 42, 26, 0.08);
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #3a2a1a;
            z-index: 1000;
            background: rgba(229, 216, 190, 0.95);
            padding: 20px 40px;
            border-radius: 4px;
            border: 1px solid rgba(80, 60, 40, 0.2);
        }

        #poem-panel {
            position: fixed;
            right: -460px;
            top: 0;
            width: 420px;
            height: 100vh;
            max-height: 100vh;
            background-color: rgba(229, 216, 190, 0.98);
            background-image: url('4.png');
            border-left: 1px solid rgba(80, 60, 40, 0.2);
            box-shadow: -4px 0 20px rgba(58, 42, 26, 0.1);
            z-index: 1000;
            overflow-y: auto;
            transition: right 0.4s ease-out;
            font-family: "KaiTi", "STKaiti", "楷体", serif;
        }

        #poem-panel.open {
            right: 0;
        }

        .panel-header {
            padding: 24px 24px 14px;
            border-bottom: 1px solid rgba(80, 60, 40, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1.3rem;
            color: #3a2a1a;
            letter-spacing: 4px;
        }

        .panel-close {
            width: 28px;
            height: 28px;
            border: none;
            background: none;
            font-size: 1.2rem;
            color: rgba(58, 42, 26, 0.4);
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-close:hover {
            background: rgba(80, 60, 40, 0.08);
            color: #3a2a1a;
        }

        .panel-back {
            border: none;
            background: none;
            font-size: 0.95rem;
            color: rgba(58, 42, 26, 0.5);
            cursor: pointer;
            padding: 4px 8px;
            font-family: "KaiTi", "STKaiti", "楷体", serif;
        }

        .panel-back:hover {
            color: #3a2a1a;
        }

        .poem-list {
            padding: 8px 0;
        }

        .poem-list-item {
            padding: 14px 18px;
            margin: 0 14px;
            cursor: pointer;
            background: transparent;
            border-bottom: 1px solid rgba(80, 60, 40, 0.08);
            border-radius: 0;
            transition: all 0.25s ease;
        }

        .poem-list-item:hover {
            background: rgba(180, 58, 48, 0.04);
            transform: none;
            box-shadow: none;
        }

        .poem-list-item .poem-title {
            font-size: 1.1rem;
            color: #3a2a1a;
        }

        .poem-list-item .poem-poet {
            font-size: 0.9rem;
            color: rgba(58, 42, 26, 0.5);
            margin-top: 4px;
        }

        .poem-detail {
            padding: 28px 28px 40px;
            position: relative;
            background-image: none;
        }

        .poem-detail .detail-title {
            font-size: 1.5rem;
            color: #3a2a1a;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .poem-detail .detail-poet {
            font-size: 1rem;
            color: rgba(58, 42, 26, 0.55);
            text-align: center;
            margin-bottom: 24px;
        }

        .poem-detail .detail-preface {
            font-size: 0.9rem;
            color: rgba(58, 42, 26, 0.5);
            line-height: 1.9;
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed rgba(80, 60, 40, 0.15);
        }

        .poem-detail .detail-content {
            font-size: 1.2rem;
            color: #3a2a1a;
            line-height: 2.4;
            text-align: center;
            white-space: pre-line;
        }

        .poem-count {
            font-size: 0.85rem;
            color: rgba(58, 42, 26, 0.5);
            padding: 0 24px 4px;
        }

        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(229, 216, 190, 0.9);
            background-image: url('4.png');
            border: 1px solid rgba(80, 60, 40, 0.2);
            border-radius: 3px;
            padding: 10px 14px;
            z-index: 1000;
            font-size: 0.75rem;
            color: #3a2a1a;
            box-shadow: 1px 1px 6px rgba(58, 42, 26, 0.06);
        }

        #legend h4 {
            margin-bottom: 6px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #3a2a1a;
            border-bottom: 1px solid rgba(80, 60, 40, 0.15);
            padding-bottom: 4px;
        }

        .mode-toggle {
            display: flex;
            gap: 0;
            margin-top: 12px;
        }

        .mode-btn {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            padding: 4px 14px;
            border: 1px solid rgba(80, 60, 40, 0.25);
            background: rgba(229, 216, 190, 0.7);
            color: rgba(58, 42, 26, 0.5);
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:first-child {
            border-radius: 4px 0 0 4px;
        }

        .mode-btn:last-child {
            border-radius: 0 4px 4px 0;
        }

        .mode-btn.active {
            background: rgba(180, 58, 48, 0.12);
            color: #3a2a1a;
            border-color: rgba(180, 58, 48, 0.3);
        }

        .mode-btn:hover:not(.active) {
            background: rgba(229, 216, 190, 0.9);
            color: #3a2a1a;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 3px 0;
        }

        .legend-color {
            width: 20px;
            height: 12px;
            border: 1px solid rgba(80, 60, 40, 0.25);
            border-radius: 1px;
            flex-shrink: 0;
        }
        #decor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: url('全.png') center center / cover no-repeat;
            pointer-events: none;
            z-index: 399;
        }

        #fog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 398;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(229, 216, 190, 0.3) 100%);
        }


        .dynasty-seal {
            display: inline-block;
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin-right: 4px;
            position: relative;
            top: -1px;
        }

    </style>
</head>
<body>
    <div id="header">
        <h1>诗词地图</h1>
        <div class="header-subtitle">唐宋诗词 · 山川足迹</div>
        <div class="mode-toggle">
            <button class="mode-btn" onclick="switchMode('tangshi')">唐诗</button>
            <button class="mode-btn" onclick="switchMode('songci')">宋词</button>
            <button class="mode-btn active" onclick="switchMode('all')">全部</button>
        </div>
        <svg class="header-seal" viewBox="0 0 34 34" width="34" height="34">
            <defs>
                <mask id="seal-mask">
                    <rect width="34" height="34" fill="white"/>
                    <text x="17" y="25" text-anchor="middle" font-size="22" font-family="SimSun, 宋体, serif" font-weight="700" fill="black">诗</text>
                </mask>
            </defs>
            <rect width="34" height="34" rx="2" fill="rgba(180, 58, 48, 0.78)" mask="url(#seal-mask)"/>
        </svg>
    </div>
    <div id="map"></div>
    <div id="fog-overlay"></div>
    <svg style="position:absolute;width:0;height:0;">
        <defs>
            <mask id="seal-tang-mask">
                <rect width="18" height="18" fill="white"/>
                <text x="9" y="14" text-anchor="middle" font-size="12" font-family="SimSun, 宋体, serif" font-weight="700" fill="black">唐</text>
            </mask>
            <mask id="seal-song-mask">
                <rect width="18" height="18" fill="white"/>
                <text x="9" y="14" text-anchor="middle" font-size="12" font-family="SimSun, 宋体, serif" font-weight="700" fill="black">宋</text>
            </mask>
        </defs>
    </svg>
    <div id="decor-overlay"></div>
    <div id="loading">地图加载中...</div>

    <div id="legend">
        <h4 id="legend-title">诗词数量</h4>
        <div class="legend-row"><span class="legend-color" style="background:#ddd4b8"></span> 0</div>
        <div class="legend-row"><span class="legend-color" style="background:#d0ddd3"></span> 1-2</div>
        <div class="legend-row"><span class="legend-color" style="background:#a8c5b0"></span> 3-5</div>
        <div class="legend-row"><span class="legend-color" style="background:#7baa8e"></span> 6-10</div>
        <div class="legend-row"><span class="legend-color" style="background:#4e8d6d"></span> 11-20</div>
        <div class="legend-row"><span class="legend-color" style="background:#2d6e4e"></span> 21-50</div>
        <div class="legend-row"><span class="legend-color" style="background:#1a5438"></span> 50+</div>
    </div>

    <div id="poem-panel">
        <div class="panel-header">
            <span id="panel-back-btn"></span>
            <h2 id="panel-title"></h2>
            <button class="panel-close" onclick="closePanel()">&#x2715;</button>
        </div>
        <div id="panel-body"></div>
    </div>

    <script src="poems_data.js"></script>
    <script>
        var map = L.map('map', {
            zoomControl: true,
            minZoom: 4,
            maxZoom: 8
        }).setView([33, 105], 5);

        map.createPane('cityPane');
        map.getPane('cityPane').style.zIndex = 400;

        map.createPane('provincePane');
        map.getPane('provincePane').style.zIndex = 450;

        map.createPane('labelPane');
        map.getPane('labelPane').style.zIndex = 460;

        function poemColor(count) {
            if (!count) return '#ddd4b8';
            if (count <= 2) return '#d0ddd3';
            if (count <= 5) return '#a8c5b0';
            if (count <= 10) return '#7baa8e';
            if (count <= 20) return '#4e8d6d';
            if (count <= 50) return '#2d6e4e';
            return '#1a5438';
        }

        var cityStyle = {
            color: 'rgba(80, 60, 40, 0.2)',
            weight: 0.5,
            fillColor: '#ddd4b8',
            fillOpacity: 1,
            pane: 'cityPane'
        };

        var wholeRegionStyle = {
            color: 'rgba(80, 60, 40, 0.2)',
            weight: 0,
            fillColor: '#ddd4b8',
            fillOpacity: 1,
            pane: 'cityPane'
        };

        var provinceStyle = {
            color: 'rgba(80, 60, 40, 0.25)',
            weight: 1,
            fill: false,
            pane: 'provincePane'
        };

        var highlightStyle = {
            fillColor: '#ddd5c8',
            fillOpacity: 1
        };

        var activeStyle = {
            fillColor: '#d0c8b8',
            fillOpacity: 1
        };

        var poemsByCity = allByCity;
        var currentMode = 'all';
        var cityLayers = [];

        var activeLayer = null;
        var activeLayerStyle = null;
        var hoveredLayer = null;

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'tangshi') {
                poemsByCity = tangshiByCity;
            } else if (mode === 'songci') {
                poemsByCity = songciByCity;
            } else {
                poemsByCity = allByCity;
            }

            var titles = { tangshi: '唐诗数量', songci: '宋词数量', all: '诗词数量' };
            document.getElementById('legend-title').textContent = titles[mode];

            var btns = document.querySelectorAll('.mode-btn');
            btns.forEach(function(btn) { btn.classList.remove('active'); });
            var modeIdx = { tangshi: 0, songci: 1, all: 2 };
            btns[modeIdx[mode]].classList.add('active');

            activeLayer = null;

            cityLayers.forEach(function(item) {
                var name = item.name;
                var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                var s = {
                    color: 'rgba(80, 60, 40, 0.2)',
                    weight: 0.5,
                    fillColor: poemColor(count),
                    fillOpacity: 1,
                    pane: 'cityPane'
                };
                item.layer.setStyle(s);
                item.style = s;
            });

            closePanel();
        }

        function closePanel() {
            document.getElementById('poem-panel').classList.remove('open');
            if (activeLayer) {
                activeLayer.setStyle(activeLayerStyle);
                activeLayer = null;
            }
        }

        function showPoemList(cityName, poems) {
            var panel = document.getElementById('poem-panel');
            var title = document.getElementById('panel-title');
            var body = document.getElementById('panel-body');
            var backBtn = document.getElementById('panel-back-btn');

            title.textContent = cityName;
            backBtn.innerHTML = '';

            var html = '<div class="poem-count">共 ' + poems.length + ' 首</div><div class="poem-list">';
            poems.forEach(function(poem, i) {
                var sealHtml = '';
                if (poem.dynasty) {
                    var maskId = poem.dynasty === '唐' ? 'seal-tang-mask' : 'seal-song-mask';
                    sealHtml = '<svg class="dynasty-seal" viewBox="0 0 18 18" width="18" height="18">'
                        + '<rect width="18" height="18" rx="1" fill="rgba(180, 58, 48, 0.68)" mask="url(#' + maskId + ')"/>'
                        + '</svg>';
                }
                html += '<div class="poem-list-item" onclick="showPoemDetail(\'' + cityName + '\',' + i + ')">'
                    + '<div class="poem-title">' + poem.title + '</div>'
                    + '<div class="poem-poet">' + sealHtml + poem.poet + '</div>'
                    + '</div>';
            });
            html += '</div>';
            body.innerHTML = html;
            panel.classList.add('open');
        }

        function showPoemDetail(cityName, index) {
            var poems = poemsByCity[cityName];
            var poem = poems[index];
            var title = document.getElementById('panel-title');
            var body = document.getElementById('panel-body');
            var backBtn = document.getElementById('panel-back-btn');

            title.textContent = '';
            backBtn.innerHTML = '<button class="panel-back" onclick="showPoemList(\'' + cityName + '\', poemsByCity[\'' + cityName + '\'])">← 返回列表</button>';

            var sealHtml = '';
            if (poem.dynasty) {
                var maskId = poem.dynasty === '唐' ? 'seal-tang-mask' : 'seal-song-mask';
                sealHtml = '<svg class="dynasty-seal" viewBox="0 0 18 18" width="18" height="18">'
                    + '<rect width="18" height="18" rx="1" fill="rgba(180, 58, 48, 0.68)" mask="url(#' + maskId + ')"/>'
                    + '</svg>';
            }
            var prefaceHtml = poem.preface
                ? '<div class="detail-preface">' + poem.preface + '</div>'
                : '';
            body.innerHTML = '<div class="poem-detail">'
                + '<div class="detail-title">' + poem.title + '</div>'
                + '<div class="detail-poet">' + sealHtml + poem.poet + '</div>'
                + prefaceHtml
                + '<div class="detail-content">' + poem.content + '</div>'
                + '</div>';
        }

        var noExpand = [
            110000, 120000, 310000, 500000,
            710000, 810000, 820000
        ];

        var labelOverrides = {
            130000: [38.5, 116.0],
            140000: [37.0, 112.3],
            150000: [43.0, 114.0],
            230000: [47.5, 128.0],
            370000: [36.2, 118.5],
            420000: [31.2, 112.2],
            430000: [27.5, 111.5],
            460000: [19.2, 109.7],
            500000: [30.3, 107.3],
            610000: [36.0, 109.0],
            620000: [38.5, 101.5],
            640000: [37.3, 106.2],
            710000: [23.7, 121.0],
            810000: [22.35, 114.15],
            820000: [22.15, 113.55]
        };

        function findCityItem(layer) {
            for (var i = 0; i < cityLayers.length; i++) {
                if (cityLayers[i].layer === layer) return cityLayers[i];
            }
            return null;
        }

        function bindCityEvents(layer, style) {
            var name = layer.feature && layer.feature.properties.name;
            if (name) {
                layer.bindTooltip(name, {
                    className: 'city-tooltip',
                    direction: 'center',
                    sticky: false
                });
            }
            layer.on('mouseover', function() {
                if (hoveredLayer && hoveredLayer !== layer) {
                    hoveredLayer.closeTooltip();
                    if (activeLayer !== hoveredLayer) {
                        var prevItem = findCityItem(hoveredLayer);
                        hoveredLayer.setStyle(prevItem ? prevItem.style : style);
                    }
                }
                hoveredLayer = layer;
                if (activeLayer !== layer) {
                    layer.setStyle(highlightStyle);
                }
            });
            layer.on('mouseout', function() {
                if (hoveredLayer === layer) {
                    hoveredLayer = null;
                }
                if (activeLayer !== layer) {
                    var item = findCityItem(layer);
                    layer.setStyle(item ? item.style : style);
                }
            });
            layer.on('click', function() {
                if (name && poemsByCity[name]) {
                    if (activeLayer && activeLayer !== layer) {
                        var prevItem = findCityItem(activeLayer);
                        activeLayer.setStyle(prevItem ? prevItem.style : activeLayerStyle);
                    }
                    activeLayer = layer;
                    var curItem = findCityItem(layer);
                    activeLayerStyle = curItem ? curItem.style : style;
                    layer.setStyle(activeStyle);
                    showPoemList(name, poemsByCity[name]);
                }
            });
        }

        function renderMap(provinceData, cityResults, wholeFeatures) {
            document.getElementById('loading').style.display = 'none';

            wholeFeatures.forEach(function(feature) {
                L.geoJSON({ type: 'FeatureCollection', features: [feature] }, {
                    style: wholeRegionStyle,
                    onEachFeature: function(f, layer) { bindCityEvents(layer, wholeRegionStyle); }
                }).addTo(map);
            });

            cityResults.forEach(function(data) {
                if (!data) return;
                L.geoJSON(data, {
                    style: function(feature) {
                        var name = feature.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        return {
                            color: 'rgba(80, 60, 40, 0.2)',
                            weight: 0.5,
                            fillColor: poemColor(count),
                            fillOpacity: 1,
                            pane: 'cityPane'
                        };
                    },
                    onEachFeature: function(f, layer) {
                        var name = f.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        var s = {
                            color: 'rgba(80, 60, 40, 0.2)',
                            weight: 0.5,
                            fillColor: poemColor(count),
                            fillOpacity: 1,
                            pane: 'cityPane'
                        };
                        var item = { name: name, layer: layer, style: s };
                        cityLayers.push(item);
                        bindCityEvents(layer, s);
                    }
                }).addTo(map);
            });

            L.geoJSON(provinceData, { style: provinceStyle }).addTo(map);

            provinceData.features.forEach(function(f) {
                var code = f.properties.adcode;
                if (typeof code !== 'number') return;
                var center;
                if (labelOverrides[code]) {
                    center = L.latLng(labelOverrides[code][0], labelOverrides[code][1]);
                } else {
                    var pt = f.properties.centroid || f.properties.center;
                    if (!pt) return;
                    center = L.latLng(pt[1], pt[0]);
                }
                L.marker(center, {
                    icon: L.divIcon({
                        className: 'province-label',
                        html: '<span class="province-label-scroll">' + f.properties.name.replace(/(壮族|回族|维吾尔)?自治区|特别行政区|省|市/g, '') + '</span>',
                        iconSize: null
                    }),
                    interactive: false,
                    pane: 'labelPane'
                }).addTo(map);
            });

        }

        fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(function(r) { return r.json(); })
            .then(function(provinceData) {
                var expandCodes = [];
                var wholeFeatures = [];

                provinceData.features.forEach(function(f) {
                    var code = f.properties.adcode;
                    if (typeof code === 'number' && noExpand.indexOf(code) === -1) {
                        expandCodes.push(code);
                    } else if (typeof code === 'number') {
                        wholeFeatures.push(f);
                    }
                });

                return Promise.all(expandCodes.map(function(code) {
                    return fetch('https://geo.datav.aliyun.com/areas_v3/bound/' + code + '_full.json')
                        .then(function(r) {
                            if (!r.ok) return null;
                            return r.json();
                        })
                        .catch(function() { return null; });
                })).then(function(cityResults) {
                    renderMap(provinceData, cityResults, wholeFeatures);
                });
            })
            .catch(function(err) {
                document.getElementById('loading').textContent = '地图加载失败，请刷新重试';
            });
    </script>
</body>
