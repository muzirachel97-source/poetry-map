<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            background-color: #f5f0e8;
            color: #333;
        }

        #header {
            text-align: center;
            padding: 16px;
            background-color: #5a3e2b;
            color: #f5f0e8;
        }

        #header h1 {
            font-size: 1.8rem;
            letter-spacing: 8px;
        }

        #map {
            width: 100%;
            height: calc(100vh - 60px);
        }

        .leaflet-container {
            background-color: #f5f0e8;
        }

        .province-label {
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
        }

        .province-label-scroll {
            display: inline-block;
            position: relative;
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            font-size: 13px;
            color: #5a3e2b;
            padding: 3px 14px;
            background: linear-gradient(180deg,
                rgba(240, 232, 215, 0.75) 0%,
                rgba(248, 242, 230, 0.8) 50%,
                rgba(240, 232, 215, 0.75) 100%);
            border-left: 3px solid rgba(180, 150, 100, 0.5);
            border-right: 3px solid rgba(180, 150, 100, 0.5);
            border-radius: 3px;
            box-shadow: 0 1px 4px rgba(90, 62, 43, 0.1);
        }

        .city-tooltip {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            font-size: 18px;
            color: #5a3e2b;
            background: rgba(245, 240, 232, 0.92);
            border: 1px solid #c4a87c;
            border-radius: 4px;
            padding: 4px 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        .poem-marker {
            background: none !important;
            border: none !important;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #5a3e2b;
            z-index: 1000;
            background: rgba(245, 240, 232, 0.95);
            padding: 20px 40px;
            border-radius: 8px;
            border: 1px solid #c4a87c;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>诗词地图</h1>
    </div>
    <div id="map"></div>
    <div id="loading">地图加载中...</div>

    <script>
        var map = L.map('map', {
            zoomControl: true,
            minZoom: 4,
            maxZoom: 8
        }).setView([33, 105], 5);

        map.createPane('cityPane');
        map.getPane('cityPane').style.zIndex = 400;

        map.createPane('provincePane');
        map.getPane('provincePane').style.zIndex = 450;

        map.createPane('labelPane');
        map.getPane('labelPane').style.zIndex = 460;

        var cityStyle = {
            color: '#b8a080',
            weight: 0.5,
            fillColor: '#faf6ee',
            fillOpacity: 1,
            pane: 'cityPane'
        };

        var wholeRegionStyle = {
            color: '#b8a080',
            weight: 0,
            fillColor: '#faf6ee',
            fillOpacity: 1,
            pane: 'cityPane'
        };

        var provinceStyle = {
            color: '#6b5540',
            weight: 3,
            fill: false,
            pane: 'provincePane'
        };

        var highlightStyle = {
            fillColor: '#f0e6d3',
            fillOpacity: 1
        };

        var brushSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="50" viewBox="0 0 22 50">'
            + '<defs>'
            + '<linearGradient id="bh" x1="0" y1="0" x2="1" y2="1">'
            + '<stop offset="0%" stop-color="#dcc488"/>'
            + '<stop offset="100%" stop-color="#9b7a30"/>'
            + '</linearGradient>'
            + '<radialGradient id="bt" cx="45%" cy="35%" r="60%">'
            + '<stop offset="0%" stop-color="#4a3525" stop-opacity="0.95"/>'
            + '<stop offset="70%" stop-color="#1a0e08" stop-opacity="0.85"/>'
            + '<stop offset="100%" stop-color="#0a0504" stop-opacity="0.5"/>'
            + '</radialGradient>'
            + '</defs>'
            + '<rect x="8" y="0" width="6" height="22" rx="3" fill="url(#bh)" opacity="0.82"/>'
            + '<line x1="8.5" y1="7" x2="13.5" y2="7" stroke="#b89848" stroke-width="0.4" opacity="0.35"/>'
            + '<line x1="8.5" y1="14" x2="13.5" y2="14" stroke="#b89848" stroke-width="0.4" opacity="0.35"/>'
            + '<ellipse cx="11" cy="22" rx="5" ry="2.2" fill="#7a6248" opacity="0.6"/>'
            + '<path d="M11 21 C8 27 3.5 35 4 40 C4.5 44 7 47.5 11 50 C15 47.5 17.5 44 18 40 C18.5 35 14 27 11 21Z" fill="url(#bt)"/>'
            + '<path d="M11 24 C9 28 6 34 6 38 C6 40 7.5 43 10 46" stroke="rgba(255,255,255,0.08)" stroke-width="1.2" fill="none"/>'
            + '</svg>';

        var brushIconUrl = 'data:image/svg+xml;utf8,' + encodeURIComponent(brushSvg);
        var brushIcon = L.icon({
            iconUrl: brushIconUrl,
            iconSize: [22, 50],
            iconAnchor: [11, 50]
        });

        var poems = [
            {
                name: "白帝城",
                lat: 31.04,
                lng: 109.55,
                poet: "李白",
                title: "早发白帝城",
                content: "朝辞白帝彩云间，千里江陵一日还。\n两岸猿声啼不住，轻舟已过万重山。"
            },
            {
                name: "岳阳楼",
                lat: 29.37,
                lng: 113.09,
                poet: "杜甫",
                title: "登岳阳楼",
                content: "昔闻洞庭水，今上岳阳楼。\n吴楚东南坼，乾坤日夜浮。\n亲朋无一字，老病有孤舟。\n戎马关山北，凭轩涕泗流。"
            },
            {
                name: "庐山",
                lat: 29.56,
                lng: 115.97,
                poet: "苏轼",
                title: "题西林壁",
                content: "横看成岭侧成峰，远近高低各不同。\n不识庐山真面目，只缘身在此山中。"
            },
            {
                name: "黄鹤楼",
                lat: 30.55,
                lng: 114.30,
                poet: "崔颢",
                title: "黄鹤楼",
                content: "昔人已乘黄鹤去，此地空余黄鹤楼。\n黄鹤一去不复返，白云千载空悠悠。\n晴川历历汉阳树，芳草萋萋鹦鹉洲。\n日暮乡关何处是？烟波江上使人愁。"
            },
            {
                name: "长安",
                lat: 34.26,
                lng: 108.94,
                poet: "王维",
                title: "送元二使安西",
                content: "渭城朝雨浥轻尘，客舍青青柳色新。\n劝君更尽一杯酒，西出阳关无故人。"
            }
        ];

        var noExpand = [
            110000, 120000, 310000, 500000,
            710000, 810000, 820000
        ];

        fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(function(r) { return r.json(); })
            .then(function(provinceData) {
                var expandCodes = [];
                var wholeFeatures = [];

                provinceData.features.forEach(function(f) {
                    var code = f.properties.adcode;
                    if (typeof code === 'number' && noExpand.indexOf(code) === -1) {
                        expandCodes.push(code);
                    } else if (typeof code === 'number') {
                        wholeFeatures.push(f);
                    }
                });

                return Promise.all(expandCodes.map(function(code) {
                    return fetch('https://geo.datav.aliyun.com/areas_v3/bound/' + code + '_full.json')
                        .then(function(r) { return r.json(); })
                        .catch(function() { return null; });
                })).then(function(cityResults) {
                    return {
                        provinceData: provinceData,
                        cityResults: cityResults,
                        wholeFeatures: wholeFeatures
                    };
                });
            })
            .then(function(result) {
                document.getElementById('loading').style.display = 'none';

                result.wholeFeatures.forEach(function(feature) {
                    var geojson = { type: 'FeatureCollection', features: [feature] };
                    L.geoJSON(geojson, {
                        style: wholeRegionStyle,
                        onEachFeature: function(feature, layer) {
                            if (feature.properties.name) {
                                layer.bindTooltip(feature.properties.name, {
                                    className: 'city-tooltip',
                                    direction: 'center',
                                    sticky: false
                                });
                            }
                            layer.on('mouseover', function() {
                                layer.setStyle(highlightStyle);
                            });
                            layer.on('mouseout', function() {
                                layer.setStyle(wholeRegionStyle);
                            });
                        }
                    }).addTo(map);
                });

                result.cityResults.forEach(function(data) {
                    if (!data) return;
                    L.geoJSON(data, {
                        style: cityStyle,
                        onEachFeature: function(feature, layer) {
                            if (feature.properties.name) {
                                layer.bindTooltip(feature.properties.name, {
                                    className: 'city-tooltip',
                                    direction: 'center',
                                    sticky: false
                                });
                            }
                            layer.on('mouseover', function() {
                                layer.setStyle(highlightStyle);
                            });
                            layer.on('mouseout', function() {
                                layer.setStyle(cityStyle);
                            });
                        }
                    }).addTo(map);
                });

                L.geoJSON(result.provinceData, { style: provinceStyle }).addTo(map);

                result.provinceData.features.forEach(function(f) {
                    if (typeof f.properties.adcode !== 'number') return;
                    var layer = L.geoJSON(f);
                    var center = layer.getBounds().getCenter();
                    L.marker(center, {
                        icon: L.divIcon({
                            className: 'province-label',
                            html: '<span class="province-label-scroll">' + f.properties.name + '</span>',
                            iconSize: null
                        }),
                        interactive: false,
                        pane: 'labelPane'
                    }).addTo(map);
                });

                poems.forEach(function(poem) {
                    L.marker([poem.lat, poem.lng], { icon: brushIcon }).addTo(map);
                });
            });
    </script>
</body>
</html>
