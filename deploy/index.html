    <style>
        :root {
            --paper-bg: #e5d8be;
            --paper-light: #f3ead8;
            --paper-mid: #efe4cf;
            --ink-main: #3f3a32;
            --ink-soft: #7c745f;
            --ink-faint: #a9a287;
            --seal-red: #b14a3a;
            --green-1: #bacfb5;
            --green-2: #a1bca0;
            --green-3: #88ab8d;
            --green-4: #6d9b79;
            --green-5: #548962;
            --green-6: #3f7950;
            --map-empty: #e3d7bf;
            --paper-grain: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "KaiTi", "STKaiti", "楷体", serif;
            background: var(--paper-bg) url('全2.png') center center / cover no-repeat fixed;
            color: var(--ink-main);
        }

        #header {
            position: fixed;
            top: 4vh;
            left: 3vw;
            z-index: 500;
            pointer-events: none;
            transform: scale(1.35);
            transform-origin: top left;
        }
        #header .mode-toggle button,
        #header h1 { pointer-events: auto; }

        #header h1 {
            position: relative;
            display: inline-block;
            line-height: 1;
            font-family: "Ma Shan Zheng", "Zhi Mang Xing", "Liu Jian Mao Cao", "STXingkai", "华文行楷", cursive, serif;
            font-size: 3.2rem;
            font-weight: 400;
            color: #2d3a2b;
            letter-spacing: 0.08em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.06), 0 0 1px rgba(45,58,43,0.1);
        }

        .header-seal {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: -38px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;

            }
            seal.style.backgroundImage = 'url(' + sc.toDataURL() + ')';
            seal.style.backgroundBlendMode = 'screen';
        })();

        var map = L.map('map', {
            zoomControl: false,
            minZoom: 3,
            maxZoom: 8,
            zoomSnap: 0.25,
            zoomDelta: 0.25
        }).setView([37.0, 105], window.innerWidth > 1600 ? 3.75 : 3.25);

        map.createPane('cityPane');
        map.getPane('cityPane').style.zIndex = 400;

        map.createPane('provincePane');
        map.getPane('provincePane').style.zIndex = 450;

        map.createPane('labelPane');
        map.getPane('labelPane').style.zIndex = 460;

        map.createPane('borderPane');
        map.getPane('borderPane').style.zIndex = 470;

        function poemColor(count) {
            if (!count) return '#e3d7bf';
            if (count <= 2) return '#bacfb5';
            if (count <= 5) return '#a1bca0';
            if (count <= 10) return '#88ab8d';
            if (count <= 20) return '#6d9b79';
            if (count <= 50) return '#548962';
            return '#3f7950';
        }

        var cityStyle = {
            color: 'rgba(88, 78, 56, 0.22)',
            weight: 0.5,
            fillColor: 'transparent',
            fillOpacity: 0,
            pane: 'cityPane'
        };

        var wholeRegionStyle = {
            color: 'rgba(88, 78, 56, 0.12)',
            weight: 0,
            fillColor: 'transparent',
            fillOpacity: 0,
            pane: 'cityPane'
        };

        var provinceStyle = {
            color: 'rgba(88, 78, 56, 0.36)',
            weight: 1.0,
            fill: false,
            pane: 'provincePane'
        };

        var highlightStyle = {
            fillColor: 'rgba(100, 133, 110, 0.25)',
            fillOpacity: 1
        };

        var activeStyle = {
            fillColor: 'rgba(100, 133, 110, 0.38)',
            fillOpacity: 1
        };

        (function() {
            var tangCount = 0, songCount = 0, citySet = {};
            for (var c in tangshiByCity) { tangCount += tangshiByCity[c].length; citySet[c] = 1; }
            for (var c in songciByCity) { songCount += songciByCity[c].length; citySet[c] = 1; }
            var cityCount = Object.keys(citySet).length;
            document.getElementById('stats').innerHTML =
                '唐诗 <span class="stat-num">' + tangCount + '</span> 首 · '
                + '宋词 <span class="stat-num">' + songCount + '</span> 首<br>'
                + '走过 <span class="stat-num">' + cityCount + '</span> 个地方'
                + ' <span id="bgm-btn" onclick="toggleBgm()" title="背景音乐">乐</span>';
        })();

        var poemsByCity = allByCity;
        var currentMode = 'all';
        var cityLayers = [];

        var activeLayer = null;
        var activeLayerStyle = null;
        var hoveredLayer = null;
        var activeDot = null;

        var brushDotIcon = (function() {
            var c = document.createElement('canvas');
            c.width = 24; c.height = 24;
            var ctx = c.getContext('2d');
            var cx = 12, cy = 12;
            var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 10);
            g.addColorStop(0, 'rgba(180, 60, 45, 0.9)');
            g.addColorStop(0.4, 'rgba(170, 55, 40, 0.75)');
            g.addColorStop(0.7, 'rgba(160, 50, 35, 0.35)');
            g.addColorStop(1, 'rgba(150, 45, 30, 0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx, cy, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(190, 65, 48, 0.85)';
            ctx.beginPath();
            ctx.arc(cx - 1, cy - 1, 4, 0, Math.PI * 2);
            ctx.fill();
            for (var i = 0; i < 6; i++) {
                var a = Math.random() * Math.PI * 2;
                var r = 3 + Math.random() * 5;
                var s = 0.5 + Math.random() * 1.2;
                ctx.fillStyle = 'rgba(175, 58, 42, ' + (0.2 + Math.random() * 0.25) + ')';
                ctx.beginPath();
                ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, s, 0, Math.PI * 2);
                ctx.fill();
            }
            return L.icon({
                iconUrl: c.toDataURL(),
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });
        })();

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'tangshi') {
                poemsByCity = tangshiByCity;
            } else if (mode === 'songci') {
                poemsByCity = songciByCity;
            } else {
                poemsByCity = allByCity;
            }

            var titles = { tangshi: '唐诗数量', songci: '宋词数量', all: '诗词数量' };
            document.getElementById('legend-title').textContent = titles[mode];

            var btns = document.querySelectorAll('.mode-btn');
            btns.forEach(function(btn) { btn.classList.remove('active'); });
            var modeIdx = { tangshi: 0, songci: 1, all: 2 };
            btns[modeIdx[mode]].classList.add('active');

            if (activeDot) { map.removeLayer(activeDot); activeDot = null; }
            activeLayer = null;

            cityLayers.forEach(function(item) {
                var name = item.name;
                var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                var s = {
                    color: 'rgba(88, 78, 56, 0.22)',
                    weight: 0.5,
                    fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                    fillOpacity: count > 0 ? 0.82 : 0.45,
                    pane: 'cityPane'
                };
                item.layer.setStyle(s);
                item.style = s;
            });

            closePanel();
        }

        function toggleBgm() {
            var audio = document.getElementById('bgm');
            var btn = document.getElementById('bgm-btn');
            if (audio.paused) {
                audio.volume = 0.3;
                audio.play();
                btn.classList.add('playing');
                btn.textContent = '乐';
            } else {
                audio.pause();
                btn.classList.remove('playing');
                btn.textContent = '乐';
            }
        }

        (function() {
            var started = false;
            function autoPlayBgm() {
                if (started) return;
                started = true;
                var audio = document.getElementById('bgm');
                var btn = document.getElementById('bgm-btn');
                audio.volume = 0.3;
                audio.play().then(function() {
                    btn.classList.add('playing');
                    btn.textContent = '乐';
                }).catch(function() { started = false; });
                document.removeEventListener('click', autoPlayBgm);
                document.removeEventListener('touchstart', autoPlayBgm);
            }
            document.addEventListener('click', autoPlayBgm, { once: true });
            document.addEventListener('touchstart', autoPlayBgm, { once: true });
        })();

        function closePanel() {
            document.getElementById('poem-panel').classList.remove('open');
            document.getElementById('detail-landscape').classList.remove('visible');
            if (activeDot) { map.removeLayer(activeDot); activeDot = null; }
            if (activeLayer) {
                activeLayer.setStyle(activeLayerStyle);
                activeLayer = null;
            }
        }

        function getExcerpt(content, lines) {
            var arr = content.split('\n');
            return arr.slice(0, lines || 2).join('\n');
        }

        function showPoemList(cityName, poems) {
            document.getElementById('detail-landscape').classList.remove('visible');
            var panel = document.getElementById('poem-panel');
            var title = document.getElementById('panel-title');
            var body = document.getElementById('panel-body');
            var backBtn = document.getElementById('panel-back-btn');

            title.textContent = cityName;
            backBtn.innerHTML = '';

            var html = '<div class="poem-count">共收录 ' + poems.length + ' 首</div><div class="poem-list">';
            poems.forEach(function(poem, i) {
                var sealMaskId = poem.dynasty === '唐' ? 'seal-tang-mask' : 'seal-song-mask';
                var sealSvg = '<svg class="card-seal" viewBox="0 0 28 28" width="28" height="28">'
                    + '<rect width="28" height="28" rx="4" fill="rgba(177, 74, 58, 0.6)" mask="url(#' + sealMaskId + ')"/>'
                    + '</svg>';
                var excerpt = getExcerpt(poem.content, 2);
                var safeCityName = cityName.replace(/'/g, "\\'");
                html += '<div class="poem-card" onclick="showPoemDetail(\'' + safeCityName + '\',' + i + ')">'
                    + sealSvg
                    + '<div class="card-title">' + poem.title + '</div>'
                    + '<div class="card-author">' + (poem.dynasty ? poem.dynasty + '·' : '') + poem.poet + '</div>'
                    + '<div class="card-excerpt">' + excerpt + '</div>'
                    + '</div>';
            });
            html += '</div>';
            body.innerHTML = html;
            panel.classList.add('open');
        }

        function showPoemDetail(cityName, index) {
            var poems = poemsByCity[cityName];
            var poem = poems[index];
            var title = document.getElementById('panel-title');
            var body = document.getElementById('panel-body');
            var backBtn = document.getElementById('panel-back-btn');

            var safeCityName = cityName.replace(/'/g, "\\'");
            title.textContent = '';
            backBtn.innerHTML = '<button class="panel-back" onclick="showPoemList(\'' + safeCityName + '\', poemsByCity[\'' + safeCityName + '\'])">← 返回列表</button>';

            var dynastyText = poem.dynasty ? poem.dynasty + '·' : '';
            var prefaceHtml = poem.preface
                ? '<div class="detail-preface">' + poem.preface + '</div>'
                : '';
            body.innerHTML = '<div class="poem-detail">'
                + '<div class="detail-title">' + poem.title + '</div>'
                + '<div class="detail-poet">' + dynastyText + poem.poet + '</div>'
                + prefaceHtml
                + '<div class="detail-content">' + poem.content + '</div>'
                + '</div>';
            document.getElementById('detail-landscape').classList.add('visible');
        }

        var noExpand = [
            110000, 120000, 310000, 500000,
            710000, 810000, 820000
        ];

        var labelOverrides = {
            110000: [39.95, 116.4],
            120000: [39.2, 117.2],
            130000: [38.5, 115.5],
            140000: [37.5, 112.3],
            150000: [43.0, 113.0],
            210000: [41.5, 123.0],
            220000: [43.5, 126.0],
            230000: [47.5, 128.0],
            310000: [31.2, 121.5],
            320000: [33.0, 119.5],
            330000: [29.0, 120.0],
            340000: [31.8, 117.2],
            350000: [26.0, 117.8],
            360000: [27.6, 115.8],
            370000: [36.2, 118.5],
            410000: [34.0, 113.5],
            420000: [31.0, 112.2],
            430000: [27.5, 111.5],
            440000: [23.5, 113.3],
            450000: [23.7, 108.5],
            460000: [19.15, 109.75],
            500000: [30.0, 107.3],
            510000: [30.5, 103.5],
            520000: [26.8, 106.8],
            530000: [25.0, 101.5],
            540000: [31.5, 87.0],
            610000: [35.5, 109.0],
            620000: [38.0, 102.5],
            630000: [35.5, 96.5],
            640000: [37.3, 106.2],
            650000: [41.5, 85.5],
            710000: [23.6, 120.85],
            810000: [22.35, 114.18],
            820000: [22.15, 113.55]
        };

        function findCityItem(layer) {
            for (var i = 0; i < cityLayers.length; i++) {
                if (cityLayers[i].layer === layer) return cityLayers[i];
            }
            return null;
        }

        function bindCityEvents(layer, style) {
            var name = layer.feature && layer.feature.properties.name;
            if (name) {
                layer.bindTooltip(name, {
                    className: 'city-tooltip',
                    direction: 'center',
                    sticky: false
                });
            }
            layer.on('mouseover', function() {
                if (hoveredLayer && hoveredLayer !== layer) {
                    hoveredLayer.closeTooltip();
                    if (activeLayer !== hoveredLayer) {
                        var prevItem = findCityItem(hoveredLayer);
                        hoveredLayer.setStyle(prevItem ? prevItem.style : style);
                    }
                }
                hoveredLayer = layer;
                if (activeLayer !== layer) {
                    layer.setStyle(highlightStyle);
                }
            });
            layer.on('mouseout', function() {
                if (hoveredLayer === layer) {
                    hoveredLayer = null;
                }
                if (activeLayer !== layer) {
                    var item = findCityItem(layer);
                    layer.setStyle(item ? item.style : style);
                }
            });
            layer.on('click', function() {
                if (name && poemsByCity[name]) {
                    if (activeLayer && activeLayer !== layer) {
                        activeLayer.closeTooltip();
                        var prevItem = findCityItem(activeLayer);
                        activeLayer.setStyle(prevItem ? prevItem.style : activeLayerStyle);
                    }
                    activeLayer = layer;
                    layer.closeTooltip();
                    var curItem = findCityItem(layer);
                    activeLayerStyle = curItem ? curItem.style : style;
                    layer.setStyle(activeStyle);
                    if (activeDot) { map.removeLayer(activeDot); }
                    var center = layer.getBounds().getCenter();
                    activeDot = L.marker(center, { icon: brushDotIcon, interactive: false }).addTo(map);
                    showPoemList(name, poemsByCity[name]);
                }
            });
        }

        function renderMap(provinceData, cityResults, wholeFeatures) {
            document.getElementById('loading').style.display = 'none';

            wholeFeatures.forEach(function(feature) {
                L.geoJSON({ type: 'FeatureCollection', features: [feature] }, {
                    style: function(f) {
                        var name = f.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        return {
                            color: 'rgba(88, 78, 56, 0.22)',
                            weight: 0.5,
                            fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                            fillOpacity: count > 0 ? 0.82 : 0.45,
                            pane: 'cityPane'
                        };
                    },
                    onEachFeature: function(f, layer) {
                        var name = f.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        var s = {
                            color: 'rgba(88, 78, 56, 0.22)',
                            weight: 0.5,
                            fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                            fillOpacity: count > 0 ? 0.82 : 0.45,
                            pane: 'cityPane'
                        };
                        var item = { name: name, layer: layer, style: s };
                        cityLayers.push(item);
                        bindCityEvents(layer, s);
                    }
                }).addTo(map);
            });

            cityResults.forEach(function(data) {
                if (!data) return;
                L.geoJSON(data, {
                    style: function(feature) {
                        var name = feature.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        return {
                            color: 'rgba(88, 78, 56, 0.22)',
                            weight: 0.5,
                            fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                            fillOpacity: count > 0 ? 0.82 : 0.45,
                            pane: 'cityPane'
                        };
                    },
                    onEachFeature: function(f, layer) {
                        var name = f.properties.name;
                        var count = poemsByCity[name] ? poemsByCity[name].length : 0;
                        var s = {
                            color: 'rgba(88, 78, 56, 0.22)',
                            weight: 0.5,
                            fillColor: count > 0 ? poemColor(count) : '#ddd2bb',
                            fillOpacity: count > 0 ? 0.82 : 0.45,
                            pane: 'cityPane'
                        };
                        var item = { name: name, layer: layer, style: s };
                        cityLayers.push(item);
                        bindCityEvents(layer, s);
                    }
                }).addTo(map);
            });

            L.geoJSON(provinceData, { style: provinceStyle }).addTo(map);

            geoFetch('100000.json')
                .then(function(borderData) {
                    L.geoJSON(borderData, {
                        style: {
                            color: 'rgba(80, 70, 50, 0.40)',
                            weight: 1.6,
                            fill: false,
                            pane: 'borderPane'
                        }
                    }).addTo(map);
                }).catch(function() {});

            provinceData.features.forEach(function(f) {
                var code = f.properties.adcode;
                if (typeof code !== 'number') return;
                var center;
                if (labelOverrides[code]) {
                    center = L.latLng(labelOverrides[code][0], labelOverrides[code][1]);
                } else {
                    var pt = f.properties.centroid || f.properties.center;
                    if (!pt) return;
                    center = L.latLng(pt[1], pt[0]);
                }
                L.marker(center, {
                    icon: L.divIcon({
                        className: 'province-label',
                        html: '<span class="province-label-scroll">' + f.properties.name.replace(/(壮族|回族|维吾尔)?自治区|特别行政区|省|市/g, '') + '</span>',
                        iconSize: null
                    }),
                    interactive: false,
                    pane: 'labelPane'
                }).addTo(map);
            });

        }

        function geoFetch(path) {
            return fetch('geo/' + path).then(function(r) {
                if (!r.ok) throw new Error(r.status);
                return r.json();
            }).catch(function() {
                return fetch('https://geo.datav.aliyun.com/areas_v3/bound/' + path).then(function(r) { return r.json(); });
            });
        }

        geoFetch('100000_full.json')
            .then(function(provinceData) {
                var expandCodes = [];
                var wholeFeatures = [];

                provinceData.features.forEach(function(f) {
                    var code = f.properties.adcode;
                    if (typeof code === 'number' && noExpand.indexOf(code) === -1) {
                        expandCodes.push(code);
                    } else if (typeof code === 'number') {
                        wholeFeatures.push(f);
                    }
                });

                return Promise.all(expandCodes.map(function(code) {
                    return geoFetch(code + '_full.json')
                        .catch(function() { return null; });
                })).then(function(cityResults) {
                    renderMap(provinceData, cityResults, wholeFeatures);
                });
            })
            .catch(function(err) {
                document.getElementById('loading').textContent = '地图加载失败，请刷新重试';
            });
    </script>
</body>
</html>
